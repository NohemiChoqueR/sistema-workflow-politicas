# Perfil local — MinIO en http://localhost:9000
app.storage.bucket=${AWS_S3_BUCKET:workflow-docs}
app.storage.region=${AWS_REGION:us-east-1}
app.storage.access-key-id=${AWS_ACCESS_KEY_ID:${MINIO_ROOT_USER:minioadmin}}
app.storage.secret-access-key=${AWS_SECRET_ACCESS_KEY:${MINIO_ROOT_PASSWORD:minioadmin123}}
app.storage.endpoint=${AWS_S3_ENDPOINT:http://localhost:9000}
app.storage.path-style-access=true
app.storage.provider-name=MINIO

# OnlyOffice Document Server (CU19)
app.onlyoffice.enabled=true
app.onlyoffice.document-server-url=http://localhost:8082
app.onlyoffice.backend-public-url=http://host.docker.internal:8080
app.onlyoffice.jwt-secret=onlyoffice-local-dev-secret
app.onlyoffice.jwt-enabled=false
