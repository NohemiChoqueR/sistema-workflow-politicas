spring.profiles.active=local

spring.data.mongodb.uri=mongodb://localhost:27017/workflow_db
server.port=8080
ai.service.url=http://localhost:8000
app.uploads.form-submissions-dir=${user.dir}/uploads/form-submissions
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.migration.key=phase1-local-dev

# Almacenamiento S3 — valores comunes (sobrescritos por perfil local/demo/prod)
app.storage.bucket=workflow-docs
app.storage.region=us-east-1
app.storage.presigned-url-expiration-minutes=15
# Motor de avance: logs obligatorios en INFO (WORKFLOW_ADVANCE)
logging.level.WORKFLOW_ADVANCE=INFO
# Debug detallado (decisión condicional / stepData): descomentar para ver más
# logging.level.CU7_DEBUG=DEBUG
