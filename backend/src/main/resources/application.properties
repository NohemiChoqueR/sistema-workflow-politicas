# MongoDB
spring.data.mongodb.uri=${MONGO_URI}

# Puerto (Render suele asignar el suyo, es bueno usar esta variable)
server.port=${PORT:8080}

# Servicio de IA
ai.service.url=${AI_SERVICE_URL:http://ai-service:8000}

# Directorio de subida (Importante: en la nube, si no tienes un S3, usa /tmp)
app.uploads.form-submissions-dir=${UPLOAD_DIR:/tmp/uploads/form-submissions}

# Límites de archivos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Clave de migración (¡Cámbiala por algo seguro!)
app.migration.key=${MIGRATION_KEY:una-clave-muy-segura-y-secreta}